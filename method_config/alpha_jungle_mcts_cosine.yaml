name: alpha_jungle_mcts
method: alpha_jungle_mcts

params:
  search_budget: 24
  example_count: 3
  repository_seed_count: 20

  uct_c: 0.70
  # ---- 自适应 UCT 探索系数 ----
  adaptive_uct: true
  uct_c_max: 1.0
  uct_c_min: 0.5
  uct_decay: "cosine"
  dimension_temperature: 0.45
  target_dimensions:
    - effectiveness
    - diversity
    - stability
    - turnover
    - overfit
  # ---- 多维 Reward 引导搜索 ----
  multi_reward_uct: true
  reward_schedule:
    early:
      progress_end: 0.35
      weights:
        effectiveness: 0.10
        diversity: 0.35
        stability: 0.15
        turnover: 0.15
        overfit: 0.25
      dimension_temperature: 0.70
    middle:
      progress_end: 0.70
      weights:
        effectiveness: 0.30
        diversity: 0.25
        stability: 0.20
        turnover: 0.125
        overfit: 0.125
      dimension_temperature: 0.45
    late:
      progress_end: 1.00
      weights:
        effectiveness: 0.45
        diversity: 0.05
        stability: 0.25
        turnover: 0.15
        overfit: 0.10
      dimension_temperature: 0.25
  q_mean_weight: 0.30
  q_max_weight: 0.70
  final_reward_weights:
    effectiveness: 0.50
    diversity: 0.10
    stability: 0.25
    turnover: 0.10

  top_forbidden_subtrees: 5
  min_forbidden_subtree_size: 3
  enforce_forbidden_subtrees: true

  max_tree_depth: 4
  max_correction_rounds: 2
  min_non_null_ratio: 0.05
  max_operator_count: 12
  enforce_baseline_diversity: true

  repository_similarity_cap: 0.85
  effective_reward_threshold: 0.58
  repo_ic_threshold: 0.015

  mcts_ic_ir_scale: 0.60
  mcts_sharpe_scale: 1.20
  turnover_scale: 1.50

  max_symbolic_length: 28
  max_free_params: 6
  max_features: 5
  max_depth: 7

  apply_mmr: true
